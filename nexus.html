<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Nexus AI — Chat IA Gratis</title>
  <style>
    :root {
      --bg:     #0d0d17;
      --bg2:    #12121f;
      --bg3:    #1a1a2e;
      --bg4:    #22223a;
      --accent: #8b5cf6;
      --accentH:#a78bfa;
      --cyan:   #22d3ee;
      --green:  #34d399;
      --red:    #f87171;
      --text:   #e2e8f0;
      --text2:  #94a3b8;
      --text3:  #64748b;
      --border: #1e1e3a;
    }
    *{margin:0;padding:0;box-sizing:border-box}
    html,body{height:100%;overflow:hidden}
    body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;
         background:var(--bg);color:var(--text);display:flex;flex-direction:column}

    /* ── Header ── */
    header{
      background:var(--bg2);border-bottom:1px solid var(--border);
      padding:10px 16px;display:flex;align-items:center;gap:10px;
      flex-shrink:0;box-shadow:0 2px 20px #00000055;flex-wrap:wrap;
    }
    .logo{display:flex;align-items:center;gap:8px;font-size:1.1rem;
          font-weight:800;color:var(--accentH);letter-spacing:1.5px;white-space:nowrap}
    .dot{width:8px;height:8px;border-radius:50%;background:var(--cyan);
         box-shadow:0 0 8px var(--cyan);animation:blink 2s infinite}
    @keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}

    select,button.hbtn{
      background:var(--bg3);color:var(--text);border:1px solid var(--border);
      padding:6px 10px;border-radius:8px;font-size:.83rem;cursor:pointer;outline:none;
      transition:border-color .2s,background .2s;font-family:inherit;
    }
    select:focus,button.hbtn:hover{border-color:var(--accent);background:var(--bg4)}
    button.hbtn{color:var(--text2)}
    button.hbtn:hover{color:var(--text)}
    .spacer{flex:1}

    /* ── Messages ── */
    #msgs{
      flex:1;overflow-y:auto;padding:20px 16px;
      display:flex;flex-direction:column;gap:14px;scroll-behavior:smooth;
    }
    #msgs::-webkit-scrollbar{width:4px}
    #msgs::-webkit-scrollbar-thumb{background:var(--bg4);border-radius:4px}

    .msg{display:flex;gap:9px;max-width:80%;animation:pop .25s ease}
    @keyframes pop{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}
    .msg.user{align-self:flex-end;flex-direction:row-reverse}
    .msg.ai{align-self:flex-start}

    .av{width:32px;height:32px;border-radius:9px;flex-shrink:0;
        display:flex;align-items:center;justify-content:center;font-size:15px}
    .av.ai{background:linear-gradient(135deg,#7c3aed,#2563eb);box-shadow:0 0 10px #7c3aed44}
    .av.user{background:linear-gradient(135deg,#0891b2,#0e7490)}

    .bbl{
      background:var(--bg3);border:1px solid var(--border);
      padding:11px 14px;border-radius:14px;
      font-size:.92rem;line-height:1.65;word-break:break-word;max-width:100%;
    }
    .msg.user .bbl{background:linear-gradient(135deg,#1e3a8a22,#5b21b622);border-color:#3b82f633}
    .msg.ai  .bbl{border-radius:5px 14px 14px 14px}
    .msg.user .bbl{border-radius:14px 5px 14px 14px}
    .bbl.err{border-color:#f8717144!important;background:rgba(248,113,113,.07)!important}

    /* markdown styles */
    .bbl h1,.bbl h2,.bbl h3{color:var(--accentH);margin:.55em 0 .25em;line-height:1.3}
    .bbl h1{font-size:1.2em}.bbl h2{font-size:1.08em}.bbl h3{font-size:.98em}
    .bbl p{margin:.35em 0}
    .bbl ul,.bbl ol{padding-left:1.4em;margin:.35em 0}
    .bbl li{margin:.2em 0}
    .bbl strong{color:var(--accentH)}
    .bbl em{color:var(--cyan);font-style:italic}
    .bbl a{color:var(--cyan);text-decoration:none}
    .bbl a:hover{text-decoration:underline}
    .bbl hr{border:none;border-top:1px solid var(--border);margin:.8em 0}
    .bbl blockquote{border-left:3px solid var(--accent);padding-left:10px;color:var(--text2);margin:.5em 0}
    .bbl table{border-collapse:collapse;width:100%;margin:.5em 0;font-size:.87em}
    .bbl th,.bbl td{border:1px solid var(--border);padding:5px 9px;text-align:left}
    .bbl th{background:var(--bg4);color:var(--accentH)}
    .bbl code:not(pre code){
      background:var(--bg4);padding:2px 6px;border-radius:4px;
      font-family:'Fira Code',Consolas,monospace;color:var(--green);font-size:.86em
    }

    /* code blocks */
    .cw{position:relative;margin:.5em 0;border-radius:10px;overflow:hidden;border:1px solid var(--border)}
    .ch{
      background:#0d1117;padding:5px 12px;
      display:flex;align-items:center;justify-content:space-between;
      font-size:.76rem;border-bottom:1px solid var(--border);
    }
    .clang{color:var(--cyan);font-weight:700;font-family:monospace}
    .cbtn{
      background:transparent;border:1px solid var(--border);color:var(--text3);
      padding:3px 9px;border-radius:5px;cursor:pointer;font-size:.73rem;
      transition:all .2s;font-family:inherit;
    }
    .cbtn:hover{background:var(--bg4);color:var(--text);border-color:var(--accent)}
    .cbtn.ok{color:var(--green);border-color:var(--green)}
    .cw pre{margin:0;padding:13px 14px;background:#0d1117;overflow-x:auto;font-size:.85rem;line-height:1.55}
    .cw pre code{background:transparent;padding:0;color:#e2e8f0;font-family:'Fira Code',Consolas,monospace}

    /* syntax highlight (custom minimal) */
    .kw{color:#ff79c6}.str{color:#f1fa8c}.num{color:#bd93f9}
    .cmt{color:#6272a4;font-style:italic}.fn{color:#50fa7b}
    .cls{color:#8be9fd}.attr{color:#ffb86c}

    /* typing dots */
    .typing{display:flex;gap:4px;padding:3px 0;align-items:center}
    .typing span{width:7px;height:7px;border-radius:50%;background:var(--accent);animation:td 1.2s infinite}
    .typing span:nth-child(2){animation-delay:.2s}
    .typing span:nth-child(3){animation-delay:.4s}
    @keyframes td{0%,60%,100%{transform:translateY(0);opacity:.35}30%{transform:translateY(-5px);opacity:1}}

    /* ── Welcome ── */
    #welcome{
      display:flex;flex-direction:column;align-items:center;justify-content:center;
      gap:16px;text-align:center;padding:40px 20px;
    }
    .wicon{font-size:3.2rem;filter:drop-shadow(0 0 20px #8b5cf688)}
    .wtitle{font-size:1.55rem;font-weight:800;color:var(--accentH)}
    .wsub{color:var(--text2);font-size:.92rem;max-width:400px;line-height:1.65}
    .qbtns{display:flex;flex-wrap:wrap;gap:7px;justify-content:center;margin-top:6px}
    .qbtn{
      background:var(--bg3);border:1px solid var(--border);color:var(--text2);
      padding:7px 13px;border-radius:20px;cursor:pointer;font-size:.8rem;
      transition:all .2s;font-family:inherit;
    }
    .qbtn:hover{background:var(--bg4);color:var(--text);border-color:var(--accent)}

    /* ── Footer / Input ── */
    footer{
      background:var(--bg2);border-top:1px solid var(--border);
      padding:11px 15px;flex-shrink:0;
    }
    .iw{
      display:flex;gap:9px;align-items:flex-end;
      background:var(--bg3);border:1px solid var(--border);
      border-radius:14px;padding:9px 11px;transition:border-color .25s,box-shadow .25s;
    }
    .iw:focus-within{border-color:var(--accent);box-shadow:0 0 0 3px #8b5cf620}
    textarea{
      flex:1;background:transparent;border:none;outline:none;
      color:var(--text);font-size:.93rem;line-height:1.5;resize:none;
      max-height:150px;min-height:24px;font-family:inherit;
    }
    textarea::placeholder{color:var(--text3)}
    .sbtn{
      background:linear-gradient(135deg,#7c3aed,#2563eb);
      border:none;color:#fff;width:36px;height:36px;border-radius:9px;
      cursor:pointer;display:flex;align-items:center;justify-content:center;
      flex-shrink:0;font-size:15px;transition:transform .15s,opacity .15s;
    }
    .sbtn:hover:not(:disabled){transform:scale(1.06)}
    .sbtn:disabled{opacity:.35;cursor:not-allowed;transform:none}
    .iinfo{display:flex;justify-content:space-between;padding:3px 3px 0;
           font-size:.71rem;color:var(--text3)}

    /* toast */
    #toast{
      position:fixed;bottom:72px;left:50%;transform:translateX(-50%);
      background:var(--bg4);border:1px solid var(--border);color:var(--text);
      padding:7px 16px;border-radius:20px;font-size:.82rem;
      opacity:0;transition:opacity .28s;pointer-events:none;z-index:200;white-space:nowrap;
    }
    #toast.on{opacity:1}

    @media(max-width:580px){
      .msg{max-width:94%}
      header{gap:7px}
      .spacer{display:none}
    }
  </style>
</head>
<body>

<header>
  <div class="logo"><div class="dot"></div>NEXUS AI</div>

  <select id="modelSel">
    <option value="openai">🚀 GPT-4o</option>
    <option value="openai-large">⚡ GPT-4o Large</option>
    <option value="mistral">🌊 Mistral Nemo</option>
    <option value="llama">🦙 Llama 3.3 70B</option>
    <option value="qwen">🔮 Qwen 2.5 72B</option>
    <option value="deepseek">🧠 DeepSeek-V3</option>
  </select>

  <select id="modeSel">
    <option value="asistente">🤖 Asistente</option>
    <option value="coder">💻 Programador</option>
    <option value="writer">✍️ Escritor</option>
    <option value="tutor">📚 Tutor</option>
    <option value="amigo">😄 Amigo</option>
  </select>

  <div class="spacer"></div>

  <button class="hbtn" onclick="clearChat()">🗑 Limpiar</button>
  <button class="hbtn" onclick="exportChat()">📥 Exportar</button>
</header>

<div id="msgs">
  <div id="welcome">
    <div class="wicon">🤖</div>
    <div class="wtitle">Nexus AI</div>
    <div class="wsub">Asistente de inteligencia artificial completamente gratis. Sin registro, sin límites.</div>
    <div class="qbtns">
      <button class="qbtn" onclick="quick('¿Qué es la inteligencia artificial? Explícamelo fácil')">🧠 ¿Qué es la IA?</button>
      <button class="qbtn" onclick="quick('Escríbeme un poema bonito sobre la luna y el mar')">📝 Poema</button>
      <button class="qbtn" onclick="quick('Muéstrame cómo hacer una función en Python que ordene una lista de mayor a menor')">🐍 Python</button>
      <button class="qbtn" onclick="quick('Dame 5 ideas de negocios originales para 2025')">💡 Ideas negocio</button>
      <button class="qbtn" onclick="quick('Cuéntame un chiste muy bueno')">😂 Chiste</button>
      <button class="qbtn" onclick="quick('¿Cuáles son los mejores trucos para aprender inglés rápido?')">🌍 Aprender inglés</button>
      <button class="qbtn" onclick="quick('Explícame cómo funciona ChatGPT por dentro')">🔬 Cómo funciona GPT</button>
      <button class="qbtn" onclick="quick('Crea un plan de ejercicios para principiantes en casa')">💪 Plan ejercicio</button>
    </div>
  </div>
</div>

<footer>
  <div class="iw">
    <textarea id="inp" placeholder="Escribe un mensaje… (Enter para enviar, Shift+Enter nueva línea)" rows="1" maxlength="4000"></textarea>
    <button class="sbtn" id="sbtn" onclick="send()">➤</button>
  </div>
  <div class="iinfo">
    <span id="st">✅ Listo · 100% Gratis · Sin registro</span>
    <span id="cc">0 / 4000</span>
  </div>
</footer>

<div id="toast"></div>

<!-- Marked.js (markdown parser) -->
<script src="https://cdn.jsdelivr.net/npm/marked@9/marked.min.js"></script>

<script>
'use strict';

// ── Personas ──────────────────────────────────────────────────────────────────
const PERSONAS = {
  asistente: 'Eres Nexus, un asistente IA útil, preciso y amigable. Siempre responde en español a menos que el usuario hable en otro idioma. Usa markdown para formatear: negritas, listas, código, tablas cuando sea apropiado. Sé conciso pero completo.',
  coder:     'Eres un experto programador full-stack con 20 años de experiencia en todos los lenguajes. Responde en español. Siempre incluye código funcional en bloques markdown con el lenguaje especificado. Explica el código brevemente. Sigue las mejores prácticas.',
  writer:    'Eres un escritor creativo y poeta talentoso. Ayudas con escritura, poesía, guiones, cuentos y contenido creativo. Responde en español con estilo elegante. Usa recursos literarios cuando sea apropiado.',
  tutor:     'Eres un tutor paciente y experto. Explicas cualquier tema de forma didáctica con ejemplos claros y analogías. Adaptas tu nivel al usuario. Haces preguntas para verificar comprensión. Responde en español.',
  amigo:     'Eres un amigo cercano, divertido y auténtico. Usas lenguaje informal, humor y emojis naturalmente. Eres honesto y directo. Apoyas y aconsejas como un buen amigo. Responde en español coloquial.',
};

// ── State ─────────────────────────────────────────────────────────────────────
let history = [];
let busy    = false;

// ── Markdown renderer ─────────────────────────────────────────────────────────
const renderer = new marked.Renderer();
renderer.code = ({ text, lang }) => {
  const language = lang || 'text';
  const escaped  = text.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  return `<div class="cw">
    <div class="ch">
      <span class="clang">${language}</span>
      <button class="cbtn" onclick="copyCode(this)">Copiar</button>
    </div>
    <pre><code>${escaped}</code></pre>
  </div>`;
};
marked.use({ renderer, breaks: true, gfm: true });

function md(text) {
  try   { return marked.parse(text); }
  catch { return text.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/\n/g,'<br>'); }
}
function esc(t) {
  return t.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

// ── DOM refs ──────────────────────────────────────────────────────────────────
const msgsEl  = document.getElementById('msgs');
const inpEl   = document.getElementById('inp');
const sbtnEl  = document.getElementById('sbtn');
const stEl    = document.getElementById('st');

// ── Helpers ───────────────────────────────────────────────────────────────────
function toast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('on');
  setTimeout(() => t.classList.remove('on'), 2400);
}
function setSt(msg) { stEl.textContent = msg; }
function scrollEnd() { setTimeout(() => msgsEl.scrollTo({top:msgsEl.scrollHeight,behavior:'smooth'}), 40); }

function rmWelcome() {
  const w = document.getElementById('welcome');
  if (w) w.remove();
}

function addMsg(role, html, isErr = false) {
  rmWelcome();
  const d = document.createElement('div');
  d.className = `msg ${role}`;
  d.innerHTML = `
    <div class="av ${role}">${role === 'ai' ? '🤖' : '👤'}</div>
    <div class="bbl${isErr ? ' err' : ''}">${html}</div>`;
  msgsEl.appendChild(d);
  scrollEnd();
  return d.querySelector('.bbl');
}

function addTyping() {
  rmWelcome();
  const d = document.createElement('div');
  d.className = 'msg ai'; d.id = 'typ';
  d.innerHTML = `<div class="av ai">🤖</div>
    <div class="bbl"><div class="typing"><span></span><span></span><span></span></div></div>`;
  msgsEl.appendChild(d); scrollEnd();
}
function rmTyping() { const t = document.getElementById('typ'); if (t) t.remove(); }

// Copy code button
function copyCode(btn) {
  const code = btn.closest('.cw').querySelector('pre code').innerText;
  navigator.clipboard.writeText(code).then(() => {
    btn.textContent = '✓ Copiado'; btn.classList.add('ok');
    setTimeout(() => { btn.textContent = 'Copiar'; btn.classList.remove('ok'); }, 2000);
  }).catch(() => toast('No se pudo copiar'));
}

// Input auto-resize
inpEl.addEventListener('input', () => {
  inpEl.style.height = 'auto';
  inpEl.style.height = Math.min(inpEl.scrollHeight, 150) + 'px';
  document.getElementById('cc').textContent = `${inpEl.value.length} / 4000`;
});
inpEl.addEventListener('keydown', e => {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); send(); }
});

// ── API ───────────────────────────────────────────────────────────────────────
async function callAPI(messages) {
  const model   = document.getElementById('modelSel').value;
  const persona = document.getElementById('modeSel').value;

  const body = {
    messages: [{ role: 'system', content: PERSONAS[persona] }, ...messages],
    model,
    seed: (Math.random() * 9999) | 0,
    private: true,
  };

  const res = await fetch('https://text.pollinations.ai/', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify(body),
  });

  if (!res.ok) throw new Error(`Error ${res.status}: ${res.statusText}`);

  const ct = res.headers.get('content-type') || '';

  // Streaming SSE
  if (ct.includes('event-stream') || ct.includes('octet-stream')) {
    return await readSSE(res);
  }

  // Plain text or JSON
  const raw = await res.text();
  // Try JSON
  try {
    const j = JSON.parse(raw);
    return j.choices?.[0]?.message?.content ?? j.text ?? raw;
  } catch {
    return raw;
  }
}

async function readSSE(res) {
  const reader  = res.body.getReader();
  const decoder = new TextDecoder();
  let buf = '', full = '';

  while (true) {
    const { done, value } = await reader.read();
    if (done) break;
    buf += decoder.decode(value, { stream: true });
    const lines = buf.split('\n');
    buf = lines.pop();
    for (const line of lines) {
      if (!line.startsWith('data:')) continue;
      const data = line.slice(5).trim();
      if (data === '[DONE]') return full;
      try {
        const j = JSON.parse(data);
        full += j.choices?.[0]?.delta?.content ?? '';
      } catch {}
    }
  }
  return full;
}

// ── Send ──────────────────────────────────────────────────────────────────────
async function send() {
  const text = inpEl.value.trim();
  if (!text || busy) return;

  busy = true;
  sbtnEl.disabled = true;
  inpEl.value = '';
  inpEl.style.height = 'auto';
  document.getElementById('cc').textContent = '0 / 4000';

  addMsg('user', esc(text));
  history.push({ role: 'user', content: text });

  addTyping();
  setSt('⏳ Pensando…');

  try {
    const reply = await callAPI(history);
    rmTyping();

    if (!reply || !reply.trim()) throw new Error('La IA devolvió una respuesta vacía. Intenta de nuevo.');

    history.push({ role: 'assistant', content: reply });
    addMsg('ai', md(reply));
    setSt('✅ Listo · 100% Gratis · Sin registro');
  } catch (err) {
    rmTyping();
    history.pop();
    addMsg('ai',
      `<strong>⚠️ No se pudo conectar a la IA</strong><br><br>` +
      `${esc(err.message)}<br><br>` +
      `Revisa tu conexión a internet e intenta de nuevo.`,
      true);
    setSt('❌ Error — intenta de nuevo');
  }

  busy = false;
  sbtnEl.disabled = false;
  inpEl.focus();
}

function quick(text) {
  inpEl.value = text;
  send();
}

// ── Clear / Export ────────────────────────────────────────────────────────────
function clearChat() {
  if (!history.length && document.getElementById('welcome')) return;
  history = [];
  msgsEl.innerHTML = `<div id="welcome">
    <div class="wicon">✨</div>
    <div class="wtitle">Chat limpiado</div>
    <div class="wsub">Empieza una nueva conversación.</div>
  </div>`;
  setSt('✅ Listo · 100% Gratis · Sin registro');
  toast('💬 Chat limpiado');
}

function exportChat() {
  if (!history.length) { toast('No hay conversación para exportar'); return; }
  const fecha = new Date().toLocaleString('es');
  const model = document.getElementById('modelSel').options[document.getElementById('modelSel').selectedIndex].text;
  let txt = `NEXUS AI — Conversación exportada\nFecha: ${fecha}\nModelo: ${model}\n${'─'.repeat(50)}\n\n`;
  for (const m of history) {
    txt += `${m.role === 'user' ? '👤 TÚ' : '🤖 NEXUS AI'}:\n${m.content}\n\n${'─'.repeat(50)}\n\n`;
  }
  const a = document.createElement('a');
  a.href     = 'data:text/plain;charset=utf-8,' + encodeURIComponent(txt);
  a.download = `nexus-ai-${Date.now()}.txt`;
  a.click();
  toast('📥 Conversación exportada');
}

// Focus on load
inpEl.focus();
</script>
</body>
</html>
