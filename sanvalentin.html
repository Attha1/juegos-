<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>San Valentín 💖</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }

body {
  min-height: 100vh;
  background: #1a0010;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-direction: column;
  font-family: 'Georgia', serif;
  overflow: hidden;
  cursor: default;
}

/* Partículas de fondo */
.petal {
  position: fixed;
  top: -20px;
  font-size: 18px;
  animation: fall linear infinite;
  pointer-events: none;
  user-select: none;
  opacity: .7;
}
@keyframes fall {
  0%   { transform: translateY(-20px) rotate(0deg); opacity: .8; }
  100% { transform: translateY(110vh) rotate(360deg); opacity: 0; }
}

/* Corazón principal */
#heart-wrap {
  display: flex;
  align-items: center;
  justify-content: center;
  margin-bottom: 10px;
  cursor: pointer;
  user-select: none;
}

#heart {
  font-size: 100px;
  transition: transform .15s cubic-bezier(.36,.07,.19,.97), filter .2s;
  filter: drop-shadow(0 0 18px #ff2060);
  display: inline-block;
  transform-origin: center bottom;
  animation: beat 1.2s ease-in-out infinite;
}
@keyframes beat {
  0%,100% { transform: scale(1); }
  14%      { transform: scale(1.15); }
  28%      { transform: scale(1); }
  42%      { transform: scale(1.1); }
  56%      { transform: scale(1); }
}
#heart:hover {
  animation: none;
  filter: drop-shadow(0 0 35px #ff2060) drop-shadow(0 0 60px #ff007a);
}

/* Título */
#titulo {
  color: #ff8aaa;
  font-size: 28px;
  text-align: center;
  letter-spacing: 2px;
  margin-bottom: 6px;
  text-shadow: 0 0 15px rgba(255,50,120,.5);
  opacity: 0;
  animation: fadeIn .8s .3s forwards;
}
#pregunta {
  color: #fff;
  font-size: 36px;
  font-weight: bold;
  text-align: center;
  margin: 14px 0 30px;
  text-shadow: 0 0 20px rgba(255,100,150,.6);
  opacity: 0;
  animation: fadeIn .8s .7s forwards;
}
@keyframes fadeIn { to { opacity:1; } }

/* Botones */
#btns {
  display: flex;
  gap: 24px;
  opacity: 0;
  animation: fadeIn .8s 1.1s forwards;
}

.btn-si {
  background: linear-gradient(135deg, #ff1a6e, #ff6699);
  color: #fff;
  border: none;
  padding: 16px 44px;
  font-size: 22px;
  font-weight: bold;
  border-radius: 50px;
  cursor: pointer;
  box-shadow: 0 4px 20px rgba(255,30,100,.5);
  transition: transform .12s, box-shadow .2s;
  letter-spacing: 2px;
}
.btn-si:hover {
  transform: scale(1.08);
  box-shadow: 0 6px 30px rgba(255,30,100,.8);
}
.btn-si:active { transform: scale(.96); }

.btn-no {
  background: rgba(255,255,255,.08);
  color: #ff8aaa;
  border: 2px solid rgba(255,100,150,.35);
  padding: 16px 44px;
  font-size: 22px;
  border-radius: 50px;
  cursor: pointer;
  transition: transform .12s, font-size .2s, padding .2s;
  letter-spacing: 2px;
}
.btn-no:hover { transform: scale(.92); color: #ffbbcc; }

/* Mensaje final */
#yes-msg {
  position: fixed;
  inset: 0;
  background: rgba(20,0,12,.92);
  display: none;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  z-index: 20;
  animation: fadeIn .5s;
}
#yes-msg .big-heart {
  font-size: 120px;
  animation: popIn .5s cubic-bezier(.36,.07,.19,.97), beatBig 1s .5s ease-in-out infinite;
}
@keyframes popIn {
  0%   { transform: scale(0); }
  70%  { transform: scale(1.2); }
  100% { transform: scale(1); }
}
@keyframes beatBig {
  0%,100% { transform: scale(1); }
  50%      { transform: scale(1.12); }
}
#yes-msg h2 {
  color: #ff6699;
  font-size: 42px;
  margin-top: 20px;
  text-shadow: 0 0 25px #ff1a6e;
  animation: fadeIn .6s .4s both;
}
#yes-msg p {
  color: #ffccdd;
  font-size: 20px;
  margin-top: 12px;
  text-align: center;
  animation: fadeIn .6s .7s both;
}
</style>
</head>
<body>

<!-- Pétalos de fondo -->
<div id="petals"></div>

<!-- Corazón -->
<div id="heart-wrap">
  <span id="heart">💖</span>
</div>

<div id="titulo">— Feliz San Valentín —</div>
<div id="pregunta">¿Quieres ser mi valentín? 🌹</div>

<div id="btns">
  <button class="btn-si" id="si">❤️ Sí</button>
  <button class="btn-no" id="no">No</button>
</div>

<!-- Mensaje cuando dice Sí -->
<div id="yes-msg">
  <div class="big-heart">💗</div>
  <h2>¡Lo sabía! 🥰</h2>
  <p>Eres lo más bonito de mi vida.<br>Te quiero mucho. 💕</p>
</div>

<script>
// === PÉTALOS CAYENDO ===
const emojis = ['🌸','❤️','💕','🌹','💫','✨','💖','🫶','💝','🌷'];
const container = document.getElementById('petals');
for(let i = 0; i < 30; i++) {
  const p = document.createElement('div');
  p.className = 'petal';
  p.textContent = emojis[Math.floor(Math.random() * emojis.length)];
  p.style.left = Math.random() * 100 + 'vw';
  p.style.animationDuration = (4 + Math.random() * 8) + 's';
  p.style.animationDelay = (Math.random() * 8) + 's';
  p.style.fontSize = (12 + Math.random() * 18) + 'px';
  container.appendChild(p);
}

// === CORAZÓN CRECE CON EL RATÓN ===
const heart = document.getElementById('heart');
let scale = 1;

heart.addEventListener('mousemove', e => {
  scale = Math.min(scale + 0.06, 4.5);
  apply();
});
heart.addEventListener('mouseleave', () => {
  const shrink = setInterval(() => {
    scale = Math.max(1, scale - 0.08);
    apply();
    if(scale <= 1) clearInterval(shrink);
  }, 20);
});
heart.addEventListener('click', () => {
  scale = Math.min(scale + 0.5, 4.5);
  apply();
  // Corazón late fuerte al hacer clic
  heart.style.filter = 'drop-shadow(0 0 50px #ff2060) drop-shadow(0 0 90px #ff007a)';
  setTimeout(() => heart.style.filter = '', 400);
});
function apply() {
  heart.style.animation = 'none';
  heart.style.transform = `scale(${scale})`;
  // Color según tamaño
  const r = Math.round(255);
  const g = Math.round(Math.max(0, 150 - (scale-1)*40));
  const b = Math.round(Math.max(50, 180 - (scale-1)*60));
  heart.style.filter = `drop-shadow(0 0 ${10+scale*8}px rgb(${r},${g},${b})) drop-shadow(0 0 ${scale*15}px rgba(255,0,80,.5))`;
}

// === BOTONES ===
document.getElementById('si').addEventListener('click', () => {
  document.getElementById('yes-msg').style.display = 'flex';
  // Lluvia de corazones
  for(let i = 0; i < 20; i++) {
    setTimeout(() => {
      const p = document.createElement('div');
      p.className = 'petal';
      p.textContent = ['💖','💗','💕','❤️','🫶'][Math.floor(Math.random()*5)];
      p.style.left = Math.random() * 100 + 'vw';
      p.style.fontSize = (20 + Math.random() * 24) + 'px';
      p.style.animationDuration = (2 + Math.random() * 3) + 's';
      p.style.animationDelay = '0s';
      container.appendChild(p);
      setTimeout(() => p.remove(), 5000);
    }, i * 80);
  }
});

// Botón NO — se hace más pequeño y escapa
let noSize = 22;
const noBtn = document.getElementById('no');
noBtn.addEventListener('mouseover', () => {
  noSize = Math.max(8, noSize - 2);
  noBtn.style.fontSize = noSize + 'px';
  noBtn.style.padding = '16px ' + Math.max(16, 44 - (22-noSize)*2) + 'px';
  // Lo movemos a posición random
  noBtn.style.position = 'relative';
  noBtn.style.left = (Math.random()-0.5)*200 + 'px';
  noBtn.style.top  = (Math.random()-0.5)*150 + 'px';
});
noBtn.addEventListener('click', () => {
  noBtn.textContent = '🤭 Anda ya...';
  noBtn.style.opacity = '.4';
  noBtn.style.pointerEvents = 'none';
  setTimeout(() => {
    noBtn.style.opacity = '0';
    noBtn.style.transition = 'opacity .4s';
  }, 700);
});
</script>
</body>
</html>
